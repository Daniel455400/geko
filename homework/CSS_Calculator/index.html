<!doctype html>
<html lang="hy">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="calculator">
      <div class="display">0</div>
      <div class="grid-container">
        <div class="btn gray">AC</div>
        <div class="btn gray">+/-</div>
        <div class="btn gray">%</div>
        <div class="btn orange">÷</div>

        <div class="btn dark-gray">7</div>
        <div class="btn dark-gray">8</div>
        <div class="btn dark-gray">9</div>
        <div class="btn orange">×</div>

        <div class="btn dark-gray">4</div>
        <div class="btn dark-gray">5</div>
        <div class="btn dark-gray">6</div>
        <div class="btn orange">-</div>

        <div class="btn dark-gray">1</div>
        <div class="btn dark-gray">2</div>
        <div class="btn dark-gray">3</div>
        <div class="btn orange">+</div>

        <div class="btn dark-gray btn-zero">0</div>
        <div class="btn dark-gray">.</div>
        <div class="btn orange">=</div>
      </div>
    </div>
  </body>
</html>
